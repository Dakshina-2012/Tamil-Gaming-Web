<!DOCTYPE html>
<html>
<head>
    <title>Tamil Gaming - Login</title>
</head>

<body background="background.jpg">

<br><br><br>

<center>

<table width="400" cellpadding="15" cellspacing="0" bgcolor="white">

    <!-- Logo Row -->
    <tr>
        <td align="center">
            <img src="logo.jpg" width="150">
        </td>
    </tr>

    <!-- Title Row -->
    <tr>
        <td align="center">
            <font size="6"><b>Tamil Gaming</b></font>

    <!-- Form Row -->
    <tr>
        <td>
            <form>
                Username:<br>
                <input type="text" placeholder="Enter Username" size="40" required>

                    <input type="submit" value="Login">

            </form>

    </tr>

    <!-- Register Row -->

        <td align="center">
            Don't have an account?
            <a href="#">Register Here</a>
        </td>
    </tr>

</table>

</center>
